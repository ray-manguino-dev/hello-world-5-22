<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Segoe UI, Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; }
    .container { background: white; padding: 3rem; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); text-align: center; max-width: 450px; width: 90%; }
    h1 { color: #333; margin-bottom: 0.5rem; font-size: 2.5rem; }
    p { color: #666; margin-bottom: 2rem; font-size: 1.1rem; }
    .form-group { display: flex; gap: 10px; flex-direction: column; }
    input[type=text] { padding: 15px; font-size: 1rem; border: 2px solid #e0e0e0; border-radius: 10px; transition: border-color 0.3s; outline: none; }
    input[type=text]:focus { border-color: #667eea; }
    button { padding: 15px 30px; font-size: 1rem; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 10px; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; font-weight: 600; }
    button:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4); }
  </style>
</head>
<body>
  <div class="container">
    <h1>Hello World! 👋</h1>
    <p>Enter your name below and say hello!</p>
    <form class="form-group">
      <input type="text" id="nameInput" placeholder="Your name..." required>
      <button type="submit">Say Hello</button>
    </form>
  </div>
</body>
</html>
